<!doctype html>
<!-- Point d'entrée HTML principal de l'application React -->
<html lang="en">

<head>
  <!-- Déclaration du charset UTF-8 pour supporter tous les caractères -->
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <!-- Meta viewport pour responsive design sur tous les appareils -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>E-Plant</title>
  <!-- Mots-clés pour le SEO -->
  <meta name="keywords"
    content="Vite, React, plants, gardening, Air Purifying Plants, Aromatic Fragrant Plants, Insect Repellent Plants, Medicinal Plants, Low Maintenance Plants" />
</head>

<body>
  <!-- Conteneur principal où React rendra toute l'application -->
  <!-- React injectera le composant racine (App) dans ce div avec l'id "root" -->
  <div id="root"></div>
  <!-- Script principal qui initialise l'application React (src/main.jsx) -->
  <!-- type="module" permet l'utilisation de la syntaxe ES6 import/export -->
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
